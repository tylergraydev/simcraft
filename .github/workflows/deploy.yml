name: Deploy to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/simhammer
            git pull origin master

            # Check latest simc commit and only rebuild if changed
            LATEST_SIMC=$(git ls-remote https://github.com/simulationcraft/simc.git HEAD | cut -f1)
            CURRENT_SIMC=$(cat .simc-version 2>/dev/null || echo "")
            if [ "$LATEST_SIMC" != "$CURRENT_SIMC" ]; then
              echo "SimC updated: $CURRENT_SIMC -> $LATEST_SIMC"
              export SIMC_VERSION="$LATEST_SIMC"
              echo "$LATEST_SIMC" > .simc-version
            else
              echo "SimC unchanged, using cached build"
            fi

            docker compose up -d --build
            docker image prune -f
