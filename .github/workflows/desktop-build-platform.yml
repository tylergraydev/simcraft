name: Desktop Build (Platform)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      os:
        required: true
        type: string
    secrets:
      CSC_LINK:
        required: false
      CSC_KEY_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

env:
  SIMC_VERSION: HEAD

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # -- SimC --
      - name: Resolve SimC version
        id: simc-version
        shell: bash
        run: |
          if [ "$SIMC_VERSION" = "HEAD" ]; then
            HASH=$(git ls-remote https://github.com/simulationcraft/simc.git HEAD | cut -f1)
          else
            HASH="$SIMC_VERSION"
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache SimC binary
        id: simc-cache
        uses: actions/cache@v4
        with:
          path: backend/resources/simc
          key: ${{ runner.os }}-simc-${{ steps.simc-version.outputs.hash }}

      - name: Clone SimC
        if: steps.simc-cache.outputs.cache-hit != 'true'
        shell: bash
        run: git clone --depth 1 https://github.com/simulationcraft/simc.git "${{ runner.temp }}/simc"

      - name: Build SimC (Windows)
        if: steps.simc-cache.outputs.cache-hit != 'true' && inputs.platform == 'windows'
        shell: cmd
        run: |
          cd "${{ runner.temp }}\simc"
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_GUI=OFF -DBUILD_TESTING=OFF -DCMAKE_CXX_FLAGS_RELEASE="/O2 /Ob3 /GL /fp:fast /DNDEBUG" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="/LTCG"
          cmake --build build --config Release --target simc

      - name: Build SimC (Unix)
        if: steps.simc-cache.outputs.cache-hit != 'true' && inputs.platform != 'windows'
        shell: bash
        run: |
          cd "${{ runner.temp }}/simc/engine"
          make LTO=1 NO_DEBUG=1 SC_NO_NETWORKING=1 -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) OPTS="-ffast-math -fomit-frame-pointer"

      - name: Install SimC binary
        if: steps.simc-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p backend/resources/simc
          if [ "${{ inputs.platform }}" = "windows" ]; then
            cp "${{ runner.temp }}/simc/build/Release/simc.exe" backend/resources/simc/simc.exe
          else
            cp "${{ runner.temp }}/simc/engine/simc" backend/resources/simc/simc
          fi

      # -- Game Data --
      - name: Fetch game data
        shell: bash
        run: |
          mkdir -p backend/resources/data-full
          cd backend/resources/data-full
          curl -sL -o metadata.json https://www.raidbots.com/static/data/live/metadata.json
          for f in $(node -e "const m=require('./metadata.json'); m.files.forEach(f=>console.log(f))"); do
            echo "  $f"
            curl -sL -o "$f" "https://www.raidbots.com/static/data/live/$f"
          done
          cp ../../core/season-config.json ./season-config.json 2>/dev/null || true

      - name: Compact game data
        shell: bash
        run: node backend/scripts/compact-data.js backend/resources/data-full backend/resources/data

      # -- Frontend --
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      # -- Build --
      - name: Build frontend
        run: cd desktop && npm run build:frontend

      - name: Build backend
        run: cd desktop && npm run build:backend

      - name: Build installer
        run: cd desktop && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ inputs.platform == 'macos' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ inputs.platform == 'macos' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ inputs.platform == 'macos' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.platform == 'macos' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ inputs.platform == 'macos' && secrets.APPLE_TEAM_ID || '' }}

      # -- Upload --
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simhammer-${{ inputs.platform }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.yml
            desktop/dist/*.blockmap
          if-no-files-found: error
