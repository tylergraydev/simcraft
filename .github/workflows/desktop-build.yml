name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  SIMC_VERSION: HEAD

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            simc_binary: simc.exe
          - os: ubuntu-latest
            platform: linux
            simc_binary: simc
          - os: macos-latest
            platform: macos
            simc_binary: simc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # -- SimC --
      - name: Clone SimC
        run: |
          git clone --depth 1 https://github.com/simulationcraft/simc.git /tmp/simc
        shell: bash

      - name: Build SimC (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          cd /tmp/simc
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_GUI=OFF -DBUILD_TESTING=OFF -DCMAKE_CXX_FLAGS_RELEASE="/O2 /Ob3 /GL /fp:fast /DNDEBUG" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="/LTCG"
          cmake --build build --config Release --target simc

      - name: Build SimC (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd /tmp/simc/engine
          make LTO=1 NO_DEBUG=1 -j$(nproc 2>/dev/null || sysctl -n hw.ncpu) OPENSSL=0 OPTS="-ffast-math -fomit-frame-pointer"

      - name: Install SimC binary
        shell: bash
        run: |
          mkdir -p backend/resources/simc
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp /tmp/simc/build/Release/simc.exe backend/resources/simc/simc.exe
          else
            cp /tmp/simc/engine/simc backend/resources/simc/simc
          fi

      # -- Game Data --
      - name: Fetch game data
        shell: bash
        run: |
          mkdir -p backend/resources/data
          cd backend/resources/data
          curl -sL -o metadata.json https://www.raidbots.com/static/data/live/metadata.json
          for f in $(node -e "const m=require('./metadata.json'); m.files.forEach(f=>console.log(f))"); do
            echo "  $f"
            curl -sL -o "$f" "https://www.raidbots.com/static/data/live/$f"
          done
          # Copy season-config.json
          cp ../../core/season-config.json ./season-config.json 2>/dev/null || true

      # -- Frontend --
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      # -- Build --
      - name: Build frontend
        run: cd desktop && npm run build:frontend

      - name: Build backend
        run: cd desktop && npm run build:backend

      - name: Build installer
        run: cd desktop && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -- Upload --
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simhammer-${{ matrix.platform }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
