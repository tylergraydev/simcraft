name: simhammer-dev

services:
  backend:
    build:
      context: backend
      dockerfile: server/Dockerfile
      args:
        - SIMC_VERSION=${SIMC_VERSION:-HEAD}
    ports:
      - "8000:8000"
    volumes:
      - simhammer-db:/app/db
    environment:
      - DATA_DIR=/app/resources/data
      - DATABASE_URL=/app/db/simhammer.db
      - PORT=8000

  frontend:
    build:
      context: frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  simhammer-db:
