services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - SIMC_PATH=/usr/local/bin/simc
      - DATABASE_URL=sqlite+aiosqlite:///./data/raidbots.db
      - CORS_ORIGINS=["*"]
    depends_on:
      - redis
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  worker:
    build: ./backend
    command: python -m arq worker.tasks.WorkerSettings
    environment:
      - REDIS_URL=redis://redis:6379
      - SIMC_PATH=/usr/local/bin/simc
      - DATABASE_URL=sqlite+aiosqlite:///./data/raidbots.db
    depends_on:
      - redis
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://${SERVER_IP:-localhost}:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
